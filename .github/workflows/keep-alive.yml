name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '*/20 * * * *'  # every 20 minutes
  workflow_dispatch:  # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Visit Streamlit app
        run: |
          python - <<'EOF'
          import asyncio
          from playwright.async_api import async_playwright

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page()
                  print("Navigating to app...")
                  await page.goto("https://bomrainfallextraction.streamlit.app/", timeout=60000)
                  # If the app is sleeping, click the wake-up button
                  try:
                      btn = page.get_by_text("Yes, get this app back up!")
                      if await btn.is_visible(timeout=5000):
                          print("App was sleeping — waking it up...")
                          await btn.click()
                          await page.wait_for_timeout(15000)
                  except Exception:
                      pass
                  # Wait for the Streamlit app to fully load
                  await page.wait_for_timeout(20000)
                  print("Done — app is awake.")
                  await browser.close()

          asyncio.run(main())
          EOF
